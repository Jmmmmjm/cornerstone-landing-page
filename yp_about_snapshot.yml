              - paragraph [ref=e628]: The Big Issue team have had a really positive experience working with Yellow Peach, who manage our website. From the outset they’ve been easy to deal with – friendly, approachable, and always happy to talk things through, making product management straightforward for a non-technical person. One of the things I value most is their practical approach. They don’t overcomplicate things or push unnecessary development, focusing instead on simple, effective solutions that add value.
